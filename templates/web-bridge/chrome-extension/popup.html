<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OMK Web Bridge</title>
  <style>
    body { min-width: 260px; font: 13px system-ui, sans-serif; margin: 12px; }
    button { width: 100%; padding: 8px; }
    label { display: block; margin: 8px 0; }
    #status { white-space: pre-wrap; color: #333; }
  </style>
</head>
<body>
  <strong>OMK Web Bridge</strong>
  <p>Send sanitized active-tab text, selection, DOM metadata, and optional screenshot to local OMK.</p>
  <label><input id="screenshot" type="checkbox"> Include screenshot</label>
  <button id="capture">Send current page</button>
  <p id="status"></p>
  <script src="popup.js"></script>
</body>
</html>
