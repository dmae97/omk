schemaVersion: omk.speckit.v1
projectRoot: /home/yu/omk
preset:
  name: omk
  version: 1.1.0
  source: ~/.omk/templates/spec-kit-omk-preset
artifacts:
  constitution: specs/constitution.md
  templates:
    spec: specs/templates/spec-template.md
    plan: specs/templates/plan-template.md
