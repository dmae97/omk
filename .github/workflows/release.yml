name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm rebuild
      - run: npm run yaml:check
      - run: npm run build
      - run: npm run lint
      - run: npm run secret:scan
      - run: npm run secret:scan:runtime
      - run: npm run check
      - run: npm run contract:check
      - run: npm run version:check
      - run: npm run proof:check
      - run: npm run verify:no-kimi
      - uses: dtolnay/rust-toolchain@stable
      - run: npm run rust:check
      - name: Run tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.log
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-release
          path: test-output.log

  native:
    name: Native Safety (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm rebuild
      - uses: dtolnay/rust-toolchain@stable
      - run: npm run native:build
      - name: Upload native safety artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: dist/native
          if-no-files-found: error

  package:
    runs-on: ubuntu-latest
    needs: [quality, native]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm rebuild
      - run: npm run build:clean
      - name: Download native safety artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: dist/native
          merge-multiple: true
      - name: Normalize native safety artifact modes
        run: npm run native:normalize
      - run: npm run audit:package
      - name: Pack tarball
        run: npm pack --ignore-scripts --json
        env:
          TMPDIR: /tmp
          TMP: /tmp
          TEMP: /tmp
          npm_config_cache: /tmp/omk-npm-cache
      - name: Resolve tarball filename
        id: tarball
        run: |
          TARBALL=$(ls *.tgz | head -n 1)
          echo "path=${TARBALL}" >> "$GITHUB_OUTPUT"
      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: tarball
          path: ${{ steps.tarball.outputs.path }}

  audit:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm rebuild
      - run: npm run build:clean
      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: tarball
      - name: Audit tarball
        run: node scripts/package-audit.mjs --tarball *.tgz

  smoke:
    name: Install Smoke (${{ matrix.os }} / Node ${{ matrix.node-version }})
    needs: [package, audit]
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: tarball
      - name: Run smoke tests
        run: node scripts/smoke-test.mjs --tarball *.tgz

  publish:
    runs-on: ubuntu-latest
    needs: [smoke]
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      - name: Resolve package metadata
        id: meta
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ "${GITHUB_REF_NAME}" != "v${PKG_VERSION}" ]; then
            echo "Git tag ${GITHUB_REF_NAME} does not match package version v${PKG_VERSION}" >&2
            exit 1
          fi
          if echo "${PKG_VERSION}" | grep -q -- '-'; then
            PRERELEASE=true
            NPM_TAG=$(node -e "const v=require('./package.json').version; const m=v.match(/-([0-9A-Za-z]+)(?:[.-].*)?$/); console.log(m ? m[1] : 'alpha')")
          else
            PRERELEASE=false
            NPM_TAG=latest
          fi
          {
            echo "pkg_name=${PKG_NAME}"
            echo "pkg_version=${PKG_VERSION}"
            echo "prerelease=${PRERELEASE}"
            echo "npm_tag=${NPM_TAG}"
          } >> "$GITHUB_OUTPUT"
      - name: Download tarball
        uses: actions/download-artifact@v4
        with:
          name: tarball
      - name: Publish to npm
        run: |
          TARBALL=$(ls *.tgz | head -n 1)
          if npm view "${{ steps.meta.outputs.pkg_name }}@${{ steps.meta.outputs.pkg_version }}" version >/dev/null 2>&1; then
            echo "Version ${{ steps.meta.outputs.pkg_version }} already exists on npm; skipping publish."
            exit 0
          fi
          if [ "${{ steps.meta.outputs.npm_tag }}" = "latest" ]; then
            npm publish "${TARBALL}" --provenance --access public
          else
            npm publish "${TARBALL}" --tag "${{ steps.meta.outputs.npm_tag }}" --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          files: "*.tgz"
